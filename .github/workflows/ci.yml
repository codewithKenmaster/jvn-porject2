# -------------------------------------------------------------
# CI PIPELINE FOR OPEN SOURCE HEALTH DASHBOARD
#
# This workflow runs on pushes to main and automates:
# - Linting server code
# - Running server tests
# - Building the React frontend
# -------------------------------------------------------------

name: CI Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Force Node.js 24 to avoid deprecation warnings

jobs:
  # ----------------------------
  # JOB 1: Lint server code
  # ----------------------------
  lint:
    name: Lint Server Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full git history to prevent git errors

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      - name: Run ESLint
        run: |
          cd server
          npm run lint

  # ----------------------------
  # JOB 2: Run server tests
  # ----------------------------
  test:
    name: Run Server Tests
    runs-on: ubuntu-latest
    needs: lint # only run tests if lint passes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      - name: Run Tests
        run: |
          cd server
          npm test

  # ----------------------------
  # JOB 3: Build React frontend
  # ----------------------------
  build-client:
    name: Build React Frontend
    runs-on: ubuntu-latest
    needs: [lint, test] # build only if lint and tests pass

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Client Dependencies
        run: |
          cd client
          npm install

      - name: Build React App
        run: |
          cd client
          npm run build

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: react-build
          path: client/build
